<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0c0d0c">
<title>卡塔赫纳柔和橙黑啤</title>
<style>
  /* ===== 视觉：1:1 复刻 azu 给的参考截图（深灰绿黑 + 大号七段时钟 + 卡片队列 + 情绪快捷条）===== */
  :root {
    color-scheme: dark;
    --bg: #0c0d0c;
    --card: #151716;
    --card-line: rgba(255,255,255,.06);
    --fg: #eceae6;
    --dim: #8a8d88;
    --faint: #565a55;
    --green: #3ddc84;
    --green-dim: rgba(61,220,132,.12);
    --mono: "SF Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg); font: 13px/1.7 var(--mono); overflow: hidden;
    /* 科技感网格底纹（V1.0.8）：极淡的绿调坐标格，像控制台 */
    background-image:
      linear-gradient(rgba(61,220,132,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(61,220,132,.03) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  /* V1.1.8：整个界面收进一张大卡片；和主播对话时卡片呼吸发光 */
  #app {
    height: calc(100% - 24px); max-width: 720px; margin: 12px auto;
    padding: 14px 18px 0; display: flex; flex-direction: column; gap: 10px;
    background: rgba(18, 21, 19, .55); border: 1px solid var(--card-line);
    border-radius: 18px; transition: box-shadow .6s ease, border-color .6s ease;
  }
  #app.live { border-color: rgba(61,220,132,.45); animation: shellGlow 2.6s ease-in-out infinite; }
  @keyframes shellGlow {
    0%, 100% { box-shadow: 0 0 16px rgba(61,220,132,.10); }
    50% { box-shadow: 0 0 42px rgba(61,220,132,.28); }
  }

  /* ===== 顶栏：台名 | 时段提示 | 开台 ===== */
  header { display: flex; align-items: center; gap: 12px; }
  #brand { font-size: 14px; letter-spacing: 2px; white-space: nowrap; }
  #ambient { flex: 1; text-align: center; color: var(--faint); font-size: 11px; letter-spacing: 1px;
             overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip {
    font: 11px/1 var(--mono); letter-spacing: 1px; color: var(--dim);
    background: var(--card); border: 1px solid var(--card-line);
    border-radius: 6px; padding: 7px 12px; cursor: pointer; user-select: none;
    touch-action: manipulation; appearance: none;
  }
  .chip:hover { color: var(--fg); }
  .chip.primary { color: #0b0d0b; background: var(--green); border-color: var(--green); font-weight: 700; }
  .chip:disabled { opacity: .35; cursor: default; }

  /* ===== 像素大时钟（V1.0.8：像素风 + 科技感辉光 + CRT 扫描线）===== */
  @font-face {
    font-family: 'PixelClock';
    src: url('fonts/PressStart2P.woff2') format('woff2');
    font-display: block;
  }
  #hero { text-align: center; padding: 4px 0 0; position: relative; }
  /* CRT 扫描线：只罩时钟区，营造老式数字钟的屏幕感 */
  #hero::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,.16) 2px 3px);
  }
  #clock {
    display: inline-block; line-height: 1; padding: 18px 0 14px;
    font: 46px 'PixelClock', var(--mono); letter-spacing: 4px; color: #f2f0ea;
    text-shadow: 0 0 16px rgba(61,220,132,.4), 0 0 3px rgba(61,220,132,.55);
    font-variant-numeric: tabular-nums;
    transform: scaleY(1.35); /* V1.1.8：像素字原生偏方，纵向拉高摆脱"扁"感 */
  }
  #clock .colon { animation: colon-blink 2s steps(1) infinite; }
  @keyframes colon-blink { 50% { opacity: .2; } }
  #dateline { color: var(--dim); font-size: 12px; letter-spacing: 3px; margin-top: 4px;
              font-variant-numeric: tabular-nums; }
  #dateline .sub { display: block; color: var(--faint); font-size: 10px; letter-spacing: 2px; }
  #onair { margin-top: 7px; font-size: 11px; letter-spacing: 2px; color: var(--faint); }
  #onair.live { color: var(--green); }
  #onair .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
                background: currentColor; margin-right: 7px; vertical-align: 1px; }
  #onair.live .dot { animation: pulse 1.6s infinite; }
  @keyframes pulse { 50% { opacity: .25; } }
  #stage { color: var(--faint); font-size: 11px; letter-spacing: 1px; margin-top: 7px; min-height: 18px; }
  #stage .dots::after { content: '…'; animation: dots 1.2s steps(3) infinite; }
  @keyframes dots { 0% { content: '·'; } 50% { content: '··'; } 100% { content: '···'; } }

  /* ===== 播放卡 ===== */
  .card { background: var(--card); border: 1px solid var(--card-line); border-radius: 14px; }
  /* 点击空白处有波纹反馈并进入歌词页（V1.1.1）；按钮与进度条不受影响 */
  /* V1.1.2：鼠标悬停"凸起"——径向高光跟随指针 + 朝指针方向轻微倾斜，移开复原 */
  #player { padding: 12px 16px; position: relative; overflow: hidden; cursor: pointer;
            transition: transform .25s ease, border-color .25s ease; will-change: transform; }
  #player::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; opacity: 0;
    transition: opacity .3s ease;
    background: radial-gradient(150px circle at var(--mx, 50%) var(--my, 50%),
                rgba(61,220,132,.10), transparent 70%);
  }
  #player:hover { border-color: rgba(61,220,132,.25); }
  #player:hover::before { opacity: 1; }
  #player-top { display: flex; align-items: center; gap: 12px; }
  #now-col { min-width: 0; flex: 1; }
  #now-title { font-size: 14px; font-weight: 700; letter-spacing: 1px;
               overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #now-artist { color: var(--dim); font-size: 11px;
                overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #btn-pause {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    background: var(--green); color: #0b0d0b; border: 0; font-size: 15px;
    cursor: pointer; touch-action: manipulation;
  }
  #btn-pause:disabled { opacity: .25; cursor: default; }
  .tbtn { background: none; border: 0; color: var(--dim); font-size: 14px; cursor: pointer;
          padding: 4px 6px; touch-action: manipulation; flex-shrink: 0; }
  .tbtn:hover { color: var(--fg); }
  .tbtn:disabled { opacity: .3; cursor: default; }
  #player-bar { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  #pbar { flex: 1; height: 3px; background: rgba(255,255,255,.08); border-radius: 2px; cursor: pointer; }
  #pbar i { display: block; height: 100%; width: 0; background: var(--green); border-radius: 2px; }
  .ptime { font-size: 10px; color: var(--faint); font-variant-numeric: tabular-nums; }
  #lyrics { margin-top: 7px; font-size: 11px; color: var(--faint); line-height: 1.8; }
  #lyrics .cur { color: var(--green); }

  /* ===== 队列卡（参考图：单卡片列表 + 播放中标签）===== */
  #queue-card { padding: 6px 6px; max-height: 168px; overflow-y: auto; scrollbar-width: thin; }
  .qrow {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 12px; border-radius: 9px; font-size: 12px; color: var(--dim);
  }
  .qrow .mark { color: var(--faint); width: 12px; flex-shrink: 0; }
  .qrow .t { min-width: 0; flex: 1; color: #c9c7c2;
             overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .qrow .a { color: var(--faint); font-size: 10px; flex-shrink: 0; max-width: 38%;
             overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .qrow.current { background: var(--green-dim); }
  .qrow.current .mark, .qrow.current .t { color: var(--green); }
  .tag { flex-shrink: 0; font-size: 9px; letter-spacing: 1px; color: var(--green);
         border: 1px solid rgba(61,220,132,.4); border-radius: 5px; padding: 2px 7px; }

  /* ===== 情绪快捷条（参考图 emoji chips）===== */
  #moods { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; padding: 1px 1px; }
  .mood {
    flex-shrink: 0; font: 11px/1 var(--mono); color: var(--dim);
    background: var(--card); border: 1px solid var(--card-line); border-radius: 16px;
    padding: 8px 13px; cursor: pointer; touch-action: manipulation; appearance: none;
  }
  .mood:hover { color: var(--green); border-color: rgba(61,220,132,.4); }
  .mood:disabled { opacity: .35; cursor: default; }

  /* ===== 对话卡（V1.1.1：与 DJ 的沟通记录独立板块，带模式徽标）===== */
  #chat-card { flex: 1; min-height: 150px; display: flex; flex-direction: column;
               padding: 10px 12px 8px; }
  #chat-head { display: flex; align-items: center; gap: 7px; font-size: 11px;
               letter-spacing: 2px; color: var(--dim); padding-bottom: 8px;
               border-bottom: 1px solid var(--card-line); }
  #chat-head .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green);
                    animation: pulse 1.6s infinite; flex-shrink: 0; }
  #chat-mode { margin-left: auto; font-size: 10px; letter-spacing: 1px; color: var(--faint);
               text-align: right; }
  #chat-card.hotline { border-color: rgba(61,220,132,.45); box-shadow: 0 0 20px rgba(61,220,132,.07); }
  #chat-card.hotline #chat-mode { color: var(--green); }
  #feed { flex: 1; min-height: 90px; overflow-y: auto; scrollbar-width: thin;
          display: flex; flex-direction: column; gap: 9px; padding: 9px 2px 2px; }
  .msg .meta .st { color: var(--faint); }
  .msg .meta .st.ok { color: var(--green); }
  .msg { max-width: 86%; }
  .msg .meta { font-size: 9px; letter-spacing: 2px; color: var(--faint); margin-bottom: 3px; }
  .msg .body {
    background: var(--card); border: 1px solid var(--card-line);
    border-radius: 11px; padding: 9px 13px; font-size: 12px; line-height: 1.8; color: #c9c7c2;
    overflow-wrap: break-word;
  }
  .msg.dj .meta { color: var(--green); }
  .msg.user { align-self: flex-end; text-align: right; }
  .msg.user .body { background: var(--green-dim); border-color: rgba(61,220,132,.25); color: var(--fg); }
  .msg.sys { align-self: center; }
  .msg.sys .body { background: none; border: 0; color: var(--faint); font-size: 10px; letter-spacing: 1px; }
  .replay { background: none; border: 0; color: var(--faint); font-size: 9px; letter-spacing: 2px;
            cursor: pointer; padding: 3px 0 0 2px; touch-action: manipulation; }
  .replay:hover { color: var(--green); }

  /* ===== 输入胶囊（参考图：mic + 输入 + 发送 同一容器）===== */
  #composer {
    display: flex; align-items: center; gap: 4px;
    background: var(--card); border: 1px solid var(--card-line); border-radius: 14px;
    padding: 5px 6px; margin-bottom: 2px;
  }
  #text-input { flex: 1; background: none; border: 0; color: var(--fg);
                padding: 8px 10px; font: 12px var(--mono); outline: none; min-width: 0; }
  #btn-call, #btn-send {
    width: 38px; height: 38px; border-radius: 10px; border: 0; background: none;
    color: var(--dim); font-size: 15px; cursor: pointer; flex-shrink: 0;
    user-select: none; -webkit-user-select: none;
  }
  #btn-call { touch-action: none; }
  #btn-send { touch-action: manipulation; }
  #btn-call:hover, #btn-send:hover { color: var(--green); background: rgba(255,255,255,.04); }
  #btn-call:disabled { opacity: .3; }
  #btn-call.recording { background: #d33; color: #fff; animation: pulse 1.2s infinite; }
  /* 听写模式（单击麦）：绿色呼吸，区别于热线的红 */
  #btn-call.listening { background: var(--green-dim); color: var(--green); animation: pulse 1.6s infinite; }

  /* ===== 📞 热线按钮（V1.1.1：热线与点歌彻底分离的独立入口）===== */
  #btn-hotline {
    width: 38px; height: 38px; border-radius: 10px; border: 0; background: none;
    color: var(--dim); font-size: 15px; cursor: pointer; flex-shrink: 0;
    touch-action: manipulation; user-select: none; -webkit-user-select: none;
  }
  #btn-hotline:hover { color: var(--green); background: rgba(255,255,255,.04); }
  #btn-hotline.on { background: var(--green); color: #0b0d0b; border-radius: 50%;
                    animation: pulse 1.6s infinite; }
  #composer.hotline { border-color: rgba(61,220,132,.5); }

  /* ===== 播放卡点击波纹 + 歌词页（V1.1.1，网易云式）===== */
  .ripple { position: absolute; width: 120px; height: 120px; margin: -60px 0 0 -60px;
            border-radius: 50%; background: rgba(61,220,132,.22); transform: scale(0);
            animation: rippleAnim .55s ease-out forwards; pointer-events: none; }
  @keyframes rippleAnim { to { transform: scale(3.4); opacity: 0; } }
  #lyric-view { position: fixed; inset: 0; z-index: 30; background: rgba(10,12,10,.96);
                backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
                display: flex; flex-direction: column; align-items: center; padding: 30px 22px 22px;
                opacity: 0; transform: scale(1.045);
                transition: opacity .38s ease, transform .38s ease; } /* 柔和淡入，不生硬跳转 */
  #lyric-view.show { opacity: 1; transform: scale(1); }
  #lyric-view[hidden] { display: none; }
  #lv-close { position: absolute; top: 14px; right: 18px; background: none; border: 0;
              color: var(--dim); font-size: 18px; cursor: pointer; padding: 4px 8px; }
  #lv-close:hover { color: var(--fg); }
  #lv-title { font-size: 17px; font-weight: 700; letter-spacing: 1px; max-width: 90%;
              overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #lv-artist { color: var(--dim); font-size: 11px; letter-spacing: 2px; margin: 5px 0 14px; }
  #lv-lines { flex: 1; width: 100%; max-width: 560px; overflow: hidden; text-align: center;
              -webkit-mask-image: linear-gradient(transparent, #000 16%, #000 84%, transparent);
              mask-image: linear-gradient(transparent, #000 16%, #000 84%, transparent); }
  #lv-scroll { transition: transform .45s ease; }
  .lv-line { padding: 9px 0; font-size: 14px; color: var(--faint); line-height: 1.7;
             transition: color .3s; }
  .lv-line.cur { color: var(--green); font-size: 16px; font-weight: 700;
                 text-shadow: 0 0 14px rgba(61,220,132,.35); }

  /* ===== 📞 沉浸式热线直播间（V1.1.3：像素 DJ 面对面，无其他信息）===== */
  #hotline-view {
    position: fixed; inset: 0; z-index: 40; background: #0a0c0a;
    background-image:
      linear-gradient(rgba(61,220,132,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(61,220,132,.03) 1px, transparent 1px);
    background-size: 28px 28px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 13px; padding: 28px 20px;
    opacity: 0; transform: scale(1.045);
    transition: opacity .38s ease, transform .38s ease;
  }
  #hotline-view.show { opacity: 1; transform: scale(1); }
  #hotline-view[hidden] { display: none; }
  #hotline-view::after { /* CRT 扫描线，和时钟区同一质感 */
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,.14) 2px 3px);
  }
  #hv-onair {
    font: 20px 'PixelClock', var(--mono); color: #ff5d5d; letter-spacing: 8px;
    text-shadow: 0 0 18px rgba(255,93,93,.5); animation: onairBlink 2.4s steps(1) infinite;
  }
  @keyframes onairBlink { 50% { opacity: .3; } }
  #hv-dj { width: 200px; max-width: 60vw; image-rendering: pixelated;
           animation: hvBob 2.8s steps(2) infinite; }
  @keyframes hvBob { 50% { transform: translateY(5px); } }
  #hv-status { color: var(--dim); font-size: 11px; letter-spacing: 2px; min-height: 16px; }
  /* V1.1.8：大对话框——你和卡卡的完整沟通记录，常驻、可上下滑动 */
  #hv-log {
    width: min(560px, 92%); flex: 1; min-height: 120px; max-height: 38vh;
    overflow-y: auto; scrollbar-width: thin;
    background: rgba(21, 23, 22, .9); border: 1px solid var(--card-line); border-radius: 14px;
    padding: 12px 14px; display: flex; flex-direction: column; gap: 7px;
    transition: box-shadow .5s ease, border-color .5s ease;
  }
  /* V1.1.9：对话框光效——接通柔光呼吸，有人在说话时变亮变快 */
  #hv-log.live { border-color: rgba(61,220,132,.35); animation: logGlow 3s ease-in-out infinite; }
  #hv-log.talking { border-color: rgba(61,220,132,.65); animation: logGlowHot 1.3s ease-in-out infinite; }
  @keyframes logGlow {
    0%, 100% { box-shadow: 0 0 10px rgba(61,220,132,.08); }
    50% { box-shadow: 0 0 22px rgba(61,220,132,.18); }
  }
  @keyframes logGlowHot {
    0%, 100% { box-shadow: 0 0 16px rgba(61,220,132,.22); }
    50% { box-shadow: 0 0 36px rgba(61,220,132,.45); }
  }
  #hv-controls { display: flex; align-items: center; gap: 14px; margin-top: 4px; }
  #hv-talk {
    min-width: 190px; height: 52px; border-radius: 26px; border: 1px solid rgba(61,220,132,.5);
    background: var(--green-dim); color: var(--green); font: 13px var(--mono); letter-spacing: 2px;
    cursor: pointer; touch-action: manipulation; user-select: none; -webkit-user-select: none;
  }
  #hv-talk.on { background: var(--green); color: #0b0d0b; }
  #hv-talk.rec { background: #d33; border-color: #d33; color: #fff; animation: pulse 1.2s infinite; }
  #hv-kb { background: none; border: 0; color: var(--faint); font-size: 16px; cursor: pointer; padding: 8px; }
  #hv-kb:hover { color: var(--fg); }
  #hv-skip { height: 52px; padding: 0 18px; border-radius: 26px; border: 1px solid var(--card-line);
             background: none; color: var(--dim); font: 13px var(--mono); letter-spacing: 2px; cursor: pointer; }
  #hv-skip:hover { color: var(--green); border-color: rgba(61,220,132,.4); }
  #hv-hangup {
    height: 52px; padding: 0 22px; border-radius: 26px; border: 1px solid rgba(221,51,51,.55);
    background: none; color: #e66; font: 13px var(--mono); letter-spacing: 2px; cursor: pointer;
  }
  #hv-hangup:hover { background: rgba(221,51,51,.12); }
  #hv-input-row { display: flex; gap: 6px; width: min(480px, 88%); }
  #hv-input-row[hidden] { display: none; }
  .hvl-row { font-size: 13px; line-height: 1.8; color: #c9c7c2; overflow-wrap: break-word; }
  .hvl-row.you { color: var(--fg); }
  .hvl-row.you::before { content: '你 ▸ '; color: var(--green); font-size: 10px; letter-spacing: 1px; }
  .hvl-row.dj::before { content: '卡卡 ▸ '; color: var(--dim); font-size: 10px; letter-spacing: 1px; }
  .hvl-row.thinking { color: var(--dim); }
  .hvl-row.thinking::after { content: '…'; animation: dots 1.2s steps(3) infinite; }
  .hvl-empty { color: var(--faint); font-size: 11px; text-align: center; padding: 14px 0; }
  #hv-text { flex: 1; background: var(--card); border: 1px solid var(--card-line); border-radius: 12px;
             color: var(--fg); padding: 11px 14px; font: 12px var(--mono); outline: none; min-width: 0; }
  #hv-send { width: 42px; border-radius: 12px; border: 0; background: var(--green); color: #0b0d0b;
             font-size: 15px; cursor: pointer; }

  /* ===== V1.2.1 状态设计四件套 ===== */
  /* ① OFF AIR 主动作：开台是全页唯一要紧的事，给它 hero 里的大按钮；开播后让位 */
  /* 注意别给它显式 display：会压过 hidden 属性，开播后就藏不掉（踩过） */
  #btn-start-hero { margin-top: 12px; position: relative; z-index: 1;
    font: 13px/1 var(--mono); letter-spacing: 6px; font-weight: 700;
    color: #0b0d0b; background: var(--green); border: 0; border-radius: 9px;
    padding: 13px 40px 13px 46px; cursor: pointer;
    box-shadow: 0 0 22px rgba(61,220,132,.22); touch-action: manipulation; }
  #btn-start-hero:hover { box-shadow: 0 0 34px rgba(61,220,132,.42); }
  /* ② ON AIR 布局权重切换：开播后时钟从主角退成挂钟，把注意力让给正在播的歌 */
  #app.onair #clock { font: 26px 'PixelClock', var(--mono); padding: 8px 0 6px; }
  #app.onair #dateline { font-size: 10px; }
  /* ③ 对话卡空状态：第一次打开不给一片黑，告诉人这台机器会什么 */
  #feed-empty { margin: auto; text-align: center; color: var(--faint);
                font-size: 11px; letter-spacing: 1px; line-height: 2.2; }
  #feed-empty .fe-tips { display: flex; gap: 18px; justify-content: center;
                         flex-wrap: wrap; color: var(--dim); margin-top: 6px; }
  /* ④ 氛围选中态 + 周报专属卡片 */
  .mood.on { color: var(--green); border-color: rgba(61,220,132,.5); background: var(--green-dim); }
  .msg.sys.report .body { background: var(--green-dim); border: 1px solid rgba(61,220,132,.35);

<script>
'use strict';
// ===== 常量（与 src/config.js rules 对齐，改值两边同步）=====
const SEGUE_LEAD_S = 15, DUCK = 0.16, FADE_MS = 260, PREFETCH_LEAD_S = 10;
const LOW_WATER = 2, MAX_BUFFER = 6, REFILL_BACKOFF_MS = 45000;
const RECORD_DUCK = 0.08; // 录音时音乐压得更低，防扬声器串进麦克风

const $ = (id) => document.getElementById(id);
const music = $('music'), voice = $('voice');

// ===== 像素大时钟（Press Start 2P，冒号呼吸）=====
let moodLabel = ''; // V1.2.1 最近点的氛围：顶栏跟着显示，让「点了氛围」立刻有回执
function drawClock() {
  const now = new Date();
  $('clock-hh').textContent = String(now.getHours()).padStart(2, '0');
  $('clock-mm').textContent = String(now.getMinutes()).padStart(2, '0');
  const week = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'][now.getDay()];
  const mon = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][now.getMonth()];
  $('dateline').replaceChildren(
    document.createTextNode(week.charAt(0) + week.slice(1).toLowerCase()),
    Object.assign(document.createElement('span'), { className: 'sub', textContent: `${String(now.getDate()).padStart(2,'0')} ${mon} ${now.getFullYear()}` }));
  const slot = ['深夜','深夜','深夜','深夜','深夜','深夜','清晨','清晨','清晨','清晨','清晨','上午','中午','中午','下午','下午','下午','下午','晚上','晚上','晚上','晚上','深夜','深夜'][now.getHours()];
  $('ambient').textContent = moodLabel ? `${slot} · ${moodLabel}氛围` : `${slot} · 陪你听歌`;
}
drawClock(); setInterval(drawClock, 1000);

// ===== 状态 =====
let queue = [];        // track: {title, artist, streamUrl, lyrics}
let queueIdx = -1;
let segments = [];     // 已对齐全局索引的 segment（带 played 标记）
let baseVolume = 1.0;
let lastRefillAt = 0;
let speaking = false;
let recording = false;
let stalled = false;       // 队列耗尽等补歌中（补到后自动续播）
let refillRetryTimer = null;
let started = false;
let hotlineOn = false;     // F14 热线会话接通中：音乐垫乐、串场与补歌挂起
let pendingSent = [];      // 本地乐观上屏的文字消息（服务端回播 user-message 时去重）
// 热线音量三档（V1.1.9 动态呼吸）：你说话 8% → 卡卡说话 16% → 谁都不说慢慢涨到 45%
const HOTLINE_IDLE = 0.45, RISE_MS = 2500;
const restLevel = () => hotlineOn ? baseVolume * HOTLINE_IDLE : baseVolume;
const riseMs = () => hotlineOn ? RISE_MS : FADE_MS; // 热线里音乐"慢慢变响"，压下去仍然是快的

const STAGE_TEXT = { '开场白': 'DJ 清了清嗓子', '选歌': 'DJ 正在挑歌', '验证': '正在核实歌单', '口播': 'DJ 正在写口播', '合成': '正在合成声音' };
function setStage(t) {
  $('stage').replaceChildren();
  if (!t) return;
  const s = document.createElement('span');
  s.textContent = t; s.className = 'dots';
  $('stage').appendChild(s);
}
function setOnAir(live, label) {
  $('onair').classList.toggle('live', live);
  $('onair-text').textContent = label || (live ? 'ON AIR' : 'OFF AIR');
  $('app').classList.toggle('onair', live);   // V1.2.1 开播后时钟让位给正在播的歌
  $('btn-start-hero').hidden = started;       // 开台动作发出后，大按钮退场
}

// ===== 对话卡信息流 =====
function addMsg(kind, who, text, ttsUrl = null) {
  if (!text) return null;
  $('feed-empty')?.remove(); // 有第一条内容，空状态引导退场
  const wrap = document.createElement('div'); wrap.className = `msg ${kind}`;
  if (kind !== 'sys') {
    const meta = document.createElement('div'); meta.className = 'meta';
    meta.textContent = `${who} · ${new Date().toTimeString().slice(0, 5)}`;
    wrap.appendChild(meta);
  }
  const body = document.createElement('div'); body.className = 'body';
  body.textContent = text; // textContent 防 LLM 文本注入标签
  wrap.appendChild(body);
  if (kind === 'dj' && ttsUrl) { // DJ 口播可重播（参考版的 REPLAY）
    const rp = document.createElement('button');
    rp.className = 'replay'; rp.textContent = '⟲ REPLAY'; rp.setAttribute('aria-label', '重播这句口播');
    rp.onclick = () => speakThen([{ type: 'quick_touch', position: 'immediate', text: '', ttsUrl, status: 'ready' }]);
    wrap.appendChild(rp);
  }
  $('feed').appendChild(wrap);
  $('feed').scrollTop = $('feed').scrollHeight;
  return wrap;
}
// 对话卡右上角的模式徽标：你永远知道现在说话算什么（热线通话 / 点歌指令）
function chatMode(t) { $('chat-mode').textContent = t; }
function setHotlineUi(on) {
  $('app').classList.toggle('live', on); // 大卡片通话发光（V1.1.8）
  $('chat-card').classList.toggle('hotline', on);
  $('composer').classList.toggle('hotline', on);
  $('btn-hotline').classList.toggle('on', on);
  $('btn-hotline').title = on ? '挂断热线（DJ 会送你一首歌收尾）' : '接通热线，和 DJ 聊天';
  $('text-input').placeholder = on ? '📞 热线通话中 · 说的每句话都发给 DJ…' : PLACEHOLDER;
}

// ===== WebSocket（断线 3s 后自动重连）=====
let ws;
function connectWs() {
  ws = new WebSocket(`ws://${location.host}/stream`);
  ws.onopen = () => { $('conn').textContent = 'CONNECTED'; $('conn').className = 'ok'; };
  ws.onmessage = (e) => handleMsg(JSON.parse(e.data));
  ws.onclose = () => {
    $('conn').textContent = 'RECONNECTING…'; $('conn').className = '';
    setTimeout(connectWs, 3000);
  };
}
connectWs();
function post(url, body) {
  return fetch(url, { method: 'POST', headers: { 'content-type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined });
}
const queuedPayload = () => queue.slice(queueIdx + 1).map(t => ({ title: t.title, artist: t.artist }));

function offsetSegments(segs, queueStart) {
  return (segs || []).map(s => ({ ...s,
    trackIndex: s.trackIndex != null ? s.trackIndex + queueStart : undefined,
    afterTrackIndex: s.afterTrackIndex != null ? s.afterTrackIndex + queueStart : undefined,
    beforeTrackIndex: s.beforeTrackIndex != null ? s.beforeTrackIndex + queueStart : undefined,
  }));
}

function handleMsg(msg) {
  // 开场白预缓存秒播：点开台 <1s 就有人声，音乐由管线随后接上
  if (msg.type === 'intro') {
    setOnAir(true, 'ON AIR');
    setStage('DJ 正在挑歌');
    speakThen([{ type: 'cold_open', position: 'immediate', text: msg.text, ttsUrl: msg.ttsUrl }]);
  }
  // 歌单先到，音乐立即开播；串场口播随 program-segments 压混进来
  if (msg.type === 'program-start') {
    queue = msg.tracks; queueIdx = -1; segments = [];
    setStage('');
    playTrack(0);
  }
  if (msg.type === 'program-segments') {
    segments.push(...offsetSegments(msg.segments, 0));
    setOnAir(true, msg.title ? `ON AIR · ${msg.title}` : 'ON AIR');
    // 开场白已由 intro 秒播；这里若还有 before_track 段（intro 兜底失败时）就压前奏说
    const opens = segments.filter(s => s.position === 'before_track' && s.trackIndex === 0);
    speakThen(opens);
  }
  if (msg.type === 'progress') setStage(started && !queue.length ? (STAGE_TEXT[msg.stage] || msg.stage) : '');
  if (msg.type === 'tracks-ready') {
    const start = queue.length;
    queue.push(...msg.tracks);
    segments.push(...offsetSegments(msg.segments, start));
    if (msg.title) setOnAir(true, `ON AIR · ${msg.title}`); // 音乐先行开台：节目名随首批歌单到
    renderQueue();
    if (stalled) { stalled = false; playTrack(queueIdx + 1); } // 断粮后补到歌：自动续播
  }
  // 点歌直接切歌（azu 决策）：歌单一确认就插队并立刻切过去
  if (msg.type === 'request-tracks' && msg.tracks?.length) {
    insertAfterCurrent(msg.tracks);
    playTrack(queueIdx + 1);
  }
  if (msg.type === 'dj-response') {
    if (msg.tracks?.length) { // 兜底：没走 request-tracks 的旧路径
      insertAfterCurrent(msg.tracks);
      if (stalled) { stalled = false; playTrack(queueIdx + 1); }
    }
    // DJ 回应立即压混说出，不顺延接缝
    speakThen((msg.segments || []).filter(s => s.position === 'immediate'));
    renderQueue();
  }
  // ===== F11 定时主动节目 =====
  // 09:00 早间叫醒：没开播才接（开着听就当无事发生）；浏览器自动播放策略可能要求页面有过交互
  if (msg.type === 'morning-call' && !started) {
    started = true;
    post('/api/start');
    prewarmMic();
    setOnAir(false, 'DIALING…');
    addMsg('sys', '', '🌅 九点了，早间节目自动开播');
  }
  // 整点 vibe check / 日程提醒：排到下一个接缝说（F3 红线：绝不压人声段）
  if (msg.type === 'vibe-check' && started && msg.segments?.length) {
    pendingSeam.push(...msg.segments);
  }
  // F12 周报：到了就给入口；apply 结果回执
  if (msg.type === 'taste-report') tasteReportArrived(msg.report);
  if (msg.type === 'taste-applied') {
    addMsg('sys', '', msg.report?.status === 'applied'
      ? '✅ 勾选的建议已合入 taste.md（修订记录小节）' : '已驳回，这周不动品味档案');
  }
  // 你的话进对话卡。本地乐观上屏过的（文字消息）只当回执，不重复添加
  if (msg.type === 'user-message') {
    setStage('');
    const i = pendingSent.indexOf(msg.transcript);
    if (i >= 0) pendingSent.splice(i, 1);
    else addMsg('user', '你', msg.transcript); // 语音转写：此刻才知道文字，上屏即送达回执
    if (hotlineOn) { chatMode('📞 卡卡回应中…'); hvStatus('卡卡回应中…'); hvLogAdd('you', msg.transcript); }
  }
  if (msg.type === 'voice-failed') {
    setStage('');
    if (hotlineOn) { chatMode('📞 没听清，再说一次'); hvStatus('没听清，再说一次'); hvLiveEnd(); }
    addMsg('sys', '', '电话有点杂音，没听清——再试一次，或直接打字');
  }
  // ===== F14 情感热线（V1.1.8 流式 + 大对话框）=====
  if (msg.type === 'hotline-opened') {
    chatMode('📞 热线通话中 · 我在听');
    hvStatus('已接通 · 点"接通对话"直接开口');
    hvLogEmpty(); // 新通话，新记录
  }
  if (msg.type === 'hotline-thinking') { // 卡卡正在想：等待必须有反馈
    chatMode('📞 卡卡正在想，马上说…');
    hvStatus('正在想，马上说…');
    hvLiveStart(); // 对话框里出现打点中的直播行
  }
  if (msg.type === 'hotline-delta') { // 逐字上屏：首批字 ~1s 就到，像看着她开口
    hvLiveDelta(msg.text);
    hvStatus('通话中');
    chatMode('📞 热线通话中');
  }
  if (msg.type === 'hotline-say') { // 逐句出声（文字已由 delta 在对话框里绘制）
    speakThen([{ ...msg.segment, noLog: true }]);
  }
  if (msg.type === 'hotline-skip') skipSong('卡卡帮你切了一首'); // 口头切歌：她说到就做到（V1.1.9）
  if (msg.type === 'hotline-reply') {
    setStage('');
    chatMode('📞 热线通话中');
    hvStatus('通话中');
    const full = (msg.segments || []).filter(s => s.text).map(s => s.text).join('');
    hvLiveEnd(); // 撤掉直播行，落定稿
    if (msg.streamed) { // 流式：声音和逐字都播过了，这里只落记录
      if (full) { addMsg('dj', '卡卡', full); hvLogAdd('dj', full); }
    } else { // 兼容非流式旧路径
      (msg.segments || []).forEach(s => hvLogAdd('dj', s.text));
      speakThen(msg.segments || []);
    }
  }
  if (msg.type === 'hotline-song') { // 收歌仪式：送歌口播压垫乐说，说完音量自然渐起
    hotlineOn = false;
    setHotlineUi(false);
    chatMode('已收线 · 这首歌送给你');
    hvStatus('🎁 这首歌送给你');
    const sends = (msg.segments || []).filter(s => s.position === 'immediate');
    sends.forEach(s => hvLogAdd('dj', s.text));
    if (msg.tracks?.length) {
      insertAfterCurrent(msg.tracks);
      playTrack(queueIdx + 1);
    }
    speakThen(sends);
    if (!sends.some(s => s.ttsUrl)) fadeMusic(baseVolume); // 口播全降级时别让音量卡在垫乐
    setTimeout(closeHotlineView, 5200); // 送歌词说完、音乐起来了，再轻轻退出直播间
  }
  if (msg.type === 'hotline-closed') {
    if (hotlineOn) { hotlineOn = false; setHotlineUi(false); fadeMusic(baseVolume); }
    if (!$('chat-mode').textContent.includes('送给你')) {
      chatMode('电台模式 · 发消息＝点歌/换氛围');
      setTimeout(closeHotlineView, 1200); // 没聊上话的静默收线
    }
  }
  if (msg.type === 'job-status') {
    console.warn('job failed:', msg);
    if (msg.job === 'start') {
      started = false; // 没开成就回到未开播态，大按钮回来、早间自动开播也不受阻
      $('btn-start').disabled = false;
      $('btn-start').textContent = '开台';
      setStage(''); setOnAir(false, '开台失败 · 点击重试');
    }
    if (msg.job === 'voice' || msg.job === 'message') {
      setStage('');
      addMsg('sys', '', 'DJ 没接到这通电话（服务出错），再试一次');
    }
    if (msg.job === 'hotline') { // 热线轮次失败（如 LLM 超时）：明确说，不无声失败
      setStage('');
      hvLiveEnd();
      addMsg('sys', '', '📞 电话出了点杂音，刚那句卡卡没接到——再说一次');
      if (hotlineOn) { chatMode('📞 热线通话中'); hvStatus('刚那句没接到，再说一次'); }
    }
    // 断粮期间补歌失败：退避后强制重试（定时器只挂一个）
    if (msg.job === 'refill' && stalled && !refillRetryTimer) {
      refillRetryTimer = setTimeout(() => { refillRetryTimer = null; if (stalled) maybeRefill(true); }, REFILL_BACKOFF_MS);
    }
  }
}
function insertAfterCurrent(tracks) {
  queue.splice(queueIdx + 1, 0, ...tracks);
  segments = segments.map(s => shiftAfter(s, queueIdx, tracks.length));
  renderQueue();
}
function shiftAfter(s, idx, n) {
  const bump = (v) => (v != null && v > idx) ? v + n : v;
  return { ...s, trackIndex: bump(s.trackIndex), afterTrackIndex: bump(s.afterTrackIndex), beforeTrackIndex: bump(s.beforeTrackIndex) };
}

// ===== 双音频编排：压混 =====
let fadeTimer = null;
function fadeMusic(target, ms = FADE_MS) {
  clearInterval(fadeTimer);
  const from = music.volume, t0 = performance.now();
  fadeTimer = setInterval(() => {
    const k = Math.min(1, (performance.now() - t0) / ms);
    music.volume = from + (target - from) * k;
    if (k === 1) clearInterval(fadeTimer);
  }, 24);
}
voice.addEventListener('play', () => { speaking = true; fadeMusic(baseVolume * DUCK); updateLogGlow(); });
voice.addEventListener('ended', () => { speaking = false; if (!recording) fadeMusic(restLevel(), riseMs()); playNextVoice(); updateLogGlow(); });
voice.addEventListener('error', () => { speaking = false; if (!recording) fadeMusic(restLevel(), riseMs()); playNextVoice(); updateLogGlow(); }); // 口播加载失败：当 ended 处理

// ===== 口播队列（segment 逐条播）=====
let voiceQueue = [], afterVoice = null;
let pendingSeam = []; // F11：vibe check / 日程提醒——等下一个接缝窗口一起说
function speakThen(segs, done) {
  voiceQueue.push(...segs.filter(s => !s.played && (s.ttsUrl || s.status === 'text-only')));
  segs.forEach(s => s.played = true);
  if (done) afterVoice = done;
  if (!speaking) playNextVoice();
}
function playNextVoice() {
  const s = voiceQueue.shift();
  if (!s) { const f = afterVoice; afterVoice = null; if (f) f(); return; }
  if (!s.noLog) addMsg('dj', '卡卡', s.text, s.ttsUrl); // noLog：流式句已由终帧整段落记录
  if (s.status === 'text-only' || !s.ttsUrl) { playNextVoice(); return; } // TTS 降级：只显示文字
  voice.src = s.ttsUrl;
  voice.play().catch(e => {
    if (e?.name === 'AbortError') return; // 换口播打断旧 play() 的 AbortError 不算失败
    playNextVoice();
  });
}

// ===== 播放与接缝调度 =====
function playTrack(i) {
  if (i >= queue.length) { stalled = true; setOnAir(true, 'ON AIR · 补歌中'); maybeRefill(true); return; }
  queueIdx = i;
  const t = queue[i];
  music.src = t.streamUrl;
  music.play().then(() => {
    $('now-title').textContent = t.title;
    $('now-artist').textContent = t.artist;
    $('btn-pause').textContent = '⏸';
    $('btn-pause').disabled = $('btn-next').disabled = false;
    post('/api/played', { title: t.title, artist: t.artist, sourceUrl: t.streamUrl });
    addMsg('sys', '', `♪ Now playing · ${t.title} — ${t.artist}`);
    setupLyrics(t.lyrics);
    seamFired = false;
    renderQueue();
  }).catch(e => {
    if (e?.name === 'AbortError') return; // 换曲打断旧 play() 的 AbortError 不算失败
    console.error('播放失败，跳过', e); playTrack(i + 1);
  });
}

let seamFired = false;
music.addEventListener('timeupdate', () => {
  const remain = music.duration - music.currentTime;
  if (isFinite(music.duration)) {
    $('t-cur').textContent = fmtTime(music.currentTime);
    $('t-dur').textContent = fmtTime(music.duration);
    const pct = music.currentTime / music.duration * 100;
    $('pbar').firstElementChild.style.width = pct + '%';
    $('pbar').setAttribute('aria-valuenow', Math.round(pct));
  }
  if (!isFinite(remain)) return;
  // 歌尾 ≤15s：串场窗口（压混说话）。满串场（V1.0.8）：除 between_tracks 外，
  // 下一首的进场介绍（before_track，跨批次接缝由补歌批生成）也排在这里说
  // 热线接通中（F14）：串场闭嘴——垫乐换歌不打断通话
  if (!seamFired && remain <= SEGUE_LEAD_S && !hotlineOn) {
    seamFired = true;
    const seams = segments.filter(s => !s.played && (
      (s.position === 'between_tracks' && s.afterTrackIndex === queueIdx) ||
      (s.position === 'before_track' && s.trackIndex === queueIdx + 1)));
    speakThen([...seams, ...pendingSeam.splice(0)]); // F11 口播搭车同一接缝
  }
  if (remain <= PREFETCH_LEAD_S) prefetchNext();
  maybeRefill();
  syncLyrics(music.currentTime);
});
// F12 行为信号：切歌=负（进度越早越强）、自然听完=正；点歌信号由服务端记
function reportSignal(type) {
  const t = queue[queueIdx];
  if (!t) return;
  const pct = isFinite(music.duration) && music.duration > 0
    ? Math.min(1, music.currentTime / music.duration) : null;
  post('/api/signal', { title: t.title, artist: t.artist, type, pct });
}
music.addEventListener('ended', () => { reportSignal('finish'); playTrack(queueIdx + 1); });
music.addEventListener('error', () => { if (queueIdx >= 0 && music.src) playTrack(queueIdx + 1); }); // 流挂了跳下一首
music.addEventListener('pause', () => { if (!music.ended) $('btn-pause').textContent = '▶'; });
music.addEventListener('play', () => { $('btn-pause').textContent = '⏸'; });
const fmtTime = (s) => `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
$('pbar').onclick = (e) => {
  if (!isFinite(music.duration)) return;
  const r = $('pbar').getBoundingClientRect();
  music.currentTime = (e.clientX - r.left) / r.width * music.duration;
};
// 进度条键盘可控
$('pbar').addEventListener('keydown', (e) => {
  if (!isFinite(music.duration)) return;
  if (e.key === 'ArrowRight') { music.currentTime = Math.min(music.duration, music.currentTime + 5); e.preventDefault(); }
  if (e.key === 'ArrowLeft') { music.currentTime = Math.max(0, music.currentTime - 5); e.preventDefault(); }
});

let prefetched = -1;
function prefetchNext() {
  if (prefetched === queueIdx + 1 || !queue[queueIdx + 1]) return;
  prefetched = queueIdx + 1;
  fetch(queue[prefetched].streamUrl, { method: 'HEAD' }).catch(() => {});
}

function maybeRefill(force = false) {
  if (hotlineOn && !force) return; // 热线中不自动补歌；但通话里切歌切空了允许强制补（V1.1.7）
  const remaining = queue.length - queueIdx - 1;
  if (!force && remaining > LOW_WATER) return;
  if (remaining >= MAX_BUFFER && !force) return;
  if (Date.now() - lastRefillAt < REFILL_BACKOFF_MS) return;
  lastRefillAt = Date.now();
  post('/api/refill', { queued: queuedPayload() });
}

// 队列卡：参考图样式——当前行绿色 + 播放中标签，其余 ▸ 行，歌手靠右
function renderQueue() {
  const list = $('queue-card');

// ===== 歌词：解析 LRC，按时间高亮当前行（F6）=====
let lrcLines = [];
let lastLrcIdx = -1;
function setupLyrics(lrc) {
  lrcLines = [];
  lastLrcIdx = -1;
  $('lyrics').textContent = '';
  for (const line of String(lrc || '').split('\n')) {
    // 多时间戳行（[00:12.34][01:23.45]歌词）：剥掉所有前导时间标签，每个时间戳各推一条
    const times = [];
    let rest = line, m;
    while ((m = rest.match(/^\[(\d+):(\d+(?:\.\d+)?)\]/))) {
      times.push(Number(m[1]) * 60 + Number(m[2]));
      rest = rest.slice(m[0].length);
    }
    const text = rest.trim();
    if (text) for (const t of times) lrcLines.push({ t, text });
  }
  lrcLines.sort((a, b) => a.t - b.t); // 多时间戳展开后可能乱序
  if (!$('lyric-view').hidden) openLyricView(); // 歌词页开着时换歌：内容跟着换
}
function syncLyrics(cur) {
  if (!lrcLines.length) return;
  let i = lrcLines.findLastIndex(l => l.t <= cur);
  if (i < 0) i = 0;
  if (i === lastLrcIdx) return; // 高亮行没变就不重绘
  lastLrcIdx = i;
  const curSpan = document.createElement('span');
  curSpan.className = 'cur'; curSpan.textContent = lrcLines[i].text;
  $('lyrics').replaceChildren(
    curSpan, document.createElement('br'),
    document.createTextNode(lrcLines[i + 1]?.text || ''));
  centerLvLine(i); // 歌词页打开时同步滚动高亮
}

// ===== 📞 沉浸式热线直播间（V1.1.3）=====
// 像素 DJ：26×22 精灵图，两帧嘴型 + 眨眼，说话时口型随口播开合
const HV_PAL = { h:'#1d231e', g:'#3ddc84', G:'#2aa763', s:'#e6b58d', S:'#d49a6e',
                 w:'#f2f0ea', b:'#10130f', k:'#10130f', d:'#181b18', D:'#222622', m:'#8a8d88' };
const HV_BASE = [
  '........hhhhhhhhhh........',
  '......hhhhhhhhhhhhhh......',
  '.....hhhhhhhhhhhhhhhh.....',
  '....g.hhhhhhhhhhhhhh.g....',
  '...ggg.ssssssssssss.ggg...',
  '...gGg.ssssssssssss.gGg...',
  '...ggg.ss.wb..wb.ss.ggg...',
  '...gGg.ssssssssssss.gGg.mm',
  '....g..ssssssssssss..g.mmm',
  '.......ss%%%%%%%%ss....mm.',
  '.......ssss££££ssss.....m.',
  '........ssssssssss......m.',
  '.........ssssssss.......m.',
  '......GGGGGGGGGGGGGG....m.',
  '....GGGgggggggggggGGG...m.',
  '...GGggggggggggggggGG...m.',
  '...GggggggggggggggggG...m.',
  'DDDDDDDDDDDDDDDDDDDDDDDDDD',
  'dddddddddddddddddddddddddd',
  'dddddddddddddddddddddddddd',
  'dd......................dd',
  'dd......................dd',
];
// 嘴型：% 行=上唇区，£ 行=下唇区。闭嘴：%→s、£ 中两格暗；张嘴：% 中四格暗、£→暗
function hvFrame(open) {
  return HV_BASE.map(row => {
    let r = row;
    if (open) {
      r = r.replace('%%%%%%%%', 'ss kkkk ss'.replace(/ /g, '') .slice(0, 8)).replace('££££', 'kkkk');
    } else {
      r = r.replace('%%%%%%%%', 'ssssssss').replace('££££', 'skks');
    }
    return r;
  });
}
function hvDraw(rows, blink = false) {
  const c = $('hv-dj'), ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  rows.forEach((row, y) => {
    for (let x = 0; x < row.length; x++) {
      let ch = row[x];
      if (blink && (ch === 'w' || ch === 'b')) ch = 'S'; // 眨眼：眼睛闭成肤色暗线
      const col = HV_PAL[ch];
      if (!col) continue;
      ctx.fillStyle = col;
      ctx.fillRect(x, y, 1, 1);
    }
  });
}

// ===== 连续对话（V1.1.8）：点一次"接通对话"，之后直接说话——
// VAD（音量活动检测）自动判断你开口/说完：开口即录，停顿 ~1s 自动发送，不用按键 =====
let vadOn = false, vadCapturing = false, vadTimer = null;
let vadCtx = null, vadAnalyser = null;
let vadNoise = 0.006, vadCalFrames = 0, vadCalSum = 0, vadVoiceMs = 0, vadSilenceMs = 0;

async function vadStart() {
  if (!(await prewarmMic())) return;
  vadCtx ??= new (window.AudioContext || window.webkitAudioContext)();
  await vadCtx.resume();
  if (!vadAnalyser) {
    const src = vadCtx.createMediaStreamSource(micStream);
    vadAnalyser = vadCtx.createAnalyser();
    vadAnalyser.fftSize = 1024;
    src.connect(vadAnalyser);
  }
  vadOn = true;
  vadCalFrames = 0; vadCalSum = 0; vadVoiceMs = 0; vadSilenceMs = 0;
  $('hv-talk').classList.add('on');
  $('hv-talk').textContent = '通话中 · 直接说话';
  hvStatus('接通了 · 直接开口就行，说完停一秒自动发');
  updateLogGlow();
  clearInterval(vadTimer);
  vadTimer = setInterval(vadTick, 60);
}
function vadPause() {
  if (!vadOn && !vadCapturing) return;
  vadOn = false;
  clearInterval(vadTimer); vadTimer = null;
  if (vadCapturing) vadEndCapture(); // 正在说的这句照常发出去
  $('hv-talk').classList.remove('on', 'rec');
  $('hv-talk').textContent = '🎙 接通对话';
  updateLogGlow();
  if (hvOpened()) hvStatus('麦克风已暂停 · 点"接通对话"恢复');
}
function vadTick() {
  if (!vadOn || !vadAnalyser) return;
  const buf = new Float32Array(vadAnalyser.fftSize);
  vadAnalyser.getFloatTimeDomainData(buf);
  let sum = 0;
  for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
  const rms = Math.sqrt(sum / buf.length);
  // 前 ~1s 校准环境底噪（含垫乐外放），阈值 = 底噪 × 2.2
  if (vadCalFrames < 15) {
    vadCalFrames++; vadCalSum += rms;
    if (vadCalFrames === 15) vadNoise = Math.max(0.004, (vadCalSum / 15) * 2.2);
    return;
  }
  // 卡卡正在说话时不开新采集：防她的声音从音箱串回麦克风触发误录
  if (speaking && !vadCapturing) { vadVoiceMs = 0; vadSilenceMs = 0; return; }
  if (rms > vadNoise) {
    vadVoiceMs += 60; vadSilenceMs = 0;
    if (!vadCapturing && vadVoiceMs >= 180) { // 连续 ~0.2s 有人声 → 开录
      vadCapturing = true;
      beginRecording();
      updateLogGlow();
      $('hv-talk').classList.add('rec');
      $('hv-talk').textContent = '在听你说…';
    }
  } else {
    vadSilenceMs += 60;
    if (!vadCapturing) vadVoiceMs = 0;
    if (vadCapturing && vadSilenceMs >= 950) vadEndCapture(); // 停顿 ~1s → 这句说完，发
  }
}
function vadEndCapture() {
  vadCapturing = false;
  vadVoiceMs = 0; vadSilenceMs = 0;
  $('hv-talk').classList.remove('rec');
  if (vadOn) $('hv-talk').textContent = '通话中 · 直接说话';
  if (recorder?.state === 'recording') { sendMode = 'talk'; endRecording(); }
}
$('hv-talk').onclick = () => { vadOn ? vadPause() : vadStart(); };
// 通话中切歌（V1.1.9 修复版）：未开播 → 直接开台（音乐先行 1s 出声）；
// 队列空 → 置断粮标记，补到歌自动续播（修复"点了没任何音乐响起"）
function skipSong(label = '换了一首') {
  if (!started) {
    started = true;
    post('/api/start');
    prewarmMic();
    setOnAir(false, 'DIALING…');
    hvStatus('开台中…音乐马上来');
    return;
  }
  reportSignal('skip'); // F12：通话中口头切歌同样是负信号
  if (queueIdx + 1 < queue.length) {
    playTrack(queueIdx + 1);
    hvStatus(label);
  } else {
    stalled = true; // 关键：补到歌自动开播，不再躺在队列里干等
    maybeRefill(true);
    hvStatus('队列空了，正在补歌…到了自动放');
  }
}
$('hv-skip').onclick = () => skipSong();
$('hv-kb').onclick = () => { const r = $('hv-input-row'); r.hidden = !r.hidden; if (!r.hidden) $('hv-text').focus(); };
function hvSend() {
  const t = $('hv-text').value.trim();
  $('hv-text').value = '';
  sendMessage(t);
}
$('hv-send').onclick = hvSend;
$('hv-text').addEventListener('keydown', (e) => { if (e.key === 'Enter') hvSend(); });
$('hv-hangup').onclick = () => {
  hvStatus('收线中 · DJ 在给你挑一首歌…');
  chatMode('📞 收线中 · DJ 在挑送你的歌…');
  post('/api/hotline/close');
};
// DJ 口播声音驱动口型
voice.addEventListener('play', () => hvSetTalking(true));
voice.addEventListener('ended', () => hvSetTalking(false));
voice.addEventListener('error', () => hvSetTalking(false));
// ===== F12 品味观察周报：提案展示 + 勾选确认合入（taste.md 用户主权，不确认不动）=====
let tasteReport = null;
function tasteReportArrived(report, { silent = false } = {}) {
  if (!report) { if (!silent) addMsg('sys', '', '📊 这周的收听信号还不够，没攒出周报'); return; }
  tasteReport = report;
  if (report.status !== 'pending') return;
  const m = addMsg('sys', '', '📊 品味观察周报来了——这周电台对你的观察，看完勾选要不要合入档案');
  if (m) {
    m.classList.add('report'); // 一周只来一次的东西，配得上一张高亮卡片
    const b = document.createElement('button');
    b.className = 'replay'; b.textContent = '查看周报'; b.setAttribute('aria-label', '查看品味观察周报');
    b.onclick = showTasteReport;
    m.appendChild(b);
  }
}
function showTasteReport() {
  if (!tasteReport) return;
  document.getElementById('taste-overlay')?.remove();
  const ov = document.createElement('div');
  ov.id = 'taste-overlay';
  ov.setAttribute('role', 'dialog'); ov.setAttribute('aria-modal', 'true'); ov.setAttribute('aria-label', '品味观察周报');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:90;display:flex;align-items:center;justify-content:center;';
  const card = document.createElement('div');
  card.style.cssText = 'background:#12161a;border:1px solid #2e3a33;border-radius:14px;max-width:540px;width:92%;max-height:80vh;overflow:auto;padding:22px;color:#cfd8d2;font-size:14px;line-height:1.7;';
  const h = document.createElement('h3');
  h.textContent = `📊 品味观察周报 · ${tasteReport.weekOf}`;
  h.style.cssText = 'margin:0 0 10px;color:#8fd3a8;font-size:16px;';
  card.appendChild(h);
  for (const o of tasteReport.observations ?? []) {
    const p = document.createElement('p'); p.textContent = '· ' + o; p.style.margin = '4px 0'; card.appendChild(p);
  }
  const sub = document.createElement('p');
  sub.textContent = '修订建议（勾选才会写进 taste.md，原文一字不动）：';
  sub.style.cssText = 'margin:14px 0 6px;color:#8fa89a;';
  card.appendChild(sub);
  const boxes = [];
  (tasteReport.suggestions ?? []).forEach((s, i) => {
    const lab = document.createElement('label');
    lab.style.cssText = 'display:flex;gap:8px;align-items:flex-start;margin:6px 0;cursor:pointer;';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.dataset.idx = i; cb.style.marginTop = '5px';
    boxes.push(cb);
    const span = document.createElement('span');
    span.textContent = `${s.change}（依据：${s.why}）`;
    lab.append(cb, span);
    card.appendChild(lab);
  });
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:10px;margin-top:16px;justify-content:flex-end;';
  const mkBtn = (txt, fn) => {
    const b = document.createElement('button');
    b.className = 'replay'; b.textContent = txt; b.onclick = fn; return b;
  };
  const submit = (accepted) => {
    post('/api/taste/report/apply', { accepted });
    tasteReport = null;
    ov.remove();
  };
  row.appendChild(mkBtn('全部驳回', () => submit([])));
  row.appendChild(mkBtn('✅ 采纳所选', () => submit(boxes.filter(b => b.checked).map(b => Number(b.dataset.idx)))));
  row.appendChild(mkBtn('稍后再说', () => ov.remove()));
  card.appendChild(row);
  ov.appendChild(card);
  ov.addEventListener('keydown', (e) => { if (e.key === 'Escape') ov.remove(); });
  ov.onclick = (e) => { if (e.target === ov) ov.remove(); };
  document.body.appendChild(ov);
  card.tabIndex = -1; card.focus();
}
// 打开页面时若有未处理的周报，提示一次（周日 20:00 不在线也不会错过）
fetch('/api/taste/report').then(r => r.json())
  .then(j => tasteReportArrived(j.report, { silent: true })).catch(() => {});

// 开发预览钩子：#hv-preview 直接看直播间（不开会话）
if (location.hash === '#hv-preview') openHotlineView();

// ===== 📞 热线（V1.1.3：打进直播间，沉浸式）=====
// 点 📞 = 接通会话并进入全屏像素直播间；挂断按钮在直播间里
$('btn-hotline').onclick = () => {
  if (!hotlineOn) {
    hotlineOn = true;
    setHotlineUi(true);
    chatMode('📞 接通中…');
    fadeMusic(restLevel()); // 音乐立即压成垫乐
    post('/api/hotline/open');
  }
  openHotlineView(); // 会话已在：重新进直播间
};

// ===== 🎙 麦克风（V1.1.3：只做"说话转文字"）=====
// 点按开始/再按结束，或按住说话松手——两种手势都把转写文字填进输入框，发送由你点确认
const VOICE_MAX_MS = 30000, LONGPRESS_MS = 350;
const PLACEHOLDER = '和卡卡说点什么…';
let micStream = null;
let recorder = null, recChunks = [], recTimer = null, lpTimer = null;
let dictating = false;   // 听写进行中（单击开启，再击结束）
let longHold = false;    // 本次按压已判定为长按对讲
let sendMode = null;     // 录音结束后的去向：'dictate' | 'talk'

async function prewarmMic() {
  if (micStream) return true;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    return true;
  } catch (e) {
    console.warn('麦克风不可用，保留文字点歌', e);
    addMsg('sys', '', '麦克风没授权——可以打字点歌');
    return false;
  }
}

function beginRecording() {
  if (!micStream || recorder?.state === 'recording') return false;
  recording = true;
  recChunks = [];
  recorder = new MediaRecorder(micStream, { mimeType: 'audio/webm' });
  recorder.ondataavailable = (e) => recChunks.push(e.data);
  recorder.onstop = onRecorded;
  recorder.start();
  fadeMusic(baseVolume * RECORD_DUCK, 120); // 立刻压低音乐：别让 DJ 听不清你
  // 上限 30s（决策项 #15）：超时按当前来源自动收尾（直播间连续对话=talk，主界面听写=dictate）
  recTimer = setTimeout(() => {
    sendMode = vadCapturing ? 'talk' : 'dictate';
    vadCapturing = false;
    dictating = false;
    endRecording();
  }, VOICE_MAX_MS);
  return true;
}
function endRecording() {
  clearTimeout(recTimer);
  $('btn-call').classList.remove('recording', 'listening');
  $('hv-talk').classList.remove('rec');
  $('hv-talk').textContent = vadOn ? '通话中 · 直接说话' : '🎙 接通对话';
  if (recorder?.state === 'recording') recorder.stop();
}
async function onRecorded() {
  recording = false;
  updateLogGlow();
  if (!speaking) fadeMusic(restLevel(), riseMs()); // 录完音乐慢慢浮上来（热线动态呼吸）
  const blob = new Blob(recChunks, { type: 'audio/webm' });
  const mode = sendMode; sendMode = null;
  const restorePh = () => { $('text-input').placeholder = hotlineOn ? '📞 热线通话中 · 说的每句话都发给 DJ…' : PLACEHOLDER; };
  if (blob.size < 2000) { restorePh(); return; } // 误触不上传
  if (mode === 'dictate') {
    $('text-input').placeholder = '正在转写…';
    try {
      const r = await fetch('/api/transcribe', { method: 'POST',
        headers: { 'content-type': 'audio/webm' }, body: blob });
      const j = await r.json().catch(() => ({}));
      if (r.ok && j.text) {
        const el = $('text-input');
        el.value = (el.value ? el.value + ' ' : '') + j.text; // 回填输入框，由你决定发不发
        el.focus();
      } else {
        addMsg('sys', '', '没听清——再试一次，或直接打字');
      }
    } catch { addMsg('sys', '', '转写服务没接通，直接打字也行'); }
    restorePh();
  } else if (mode === 'talk') { // 对讲直发：热线中=通话轮次；电台模式=语音点歌
    if (hotlineOn) chatMode('📞 语音已送出 · 转写中…');
    else setStage('热线接通中');
    const note = addMsg('sys', '', '🎙 语音发送中…');
    try {
      // body 是音频流，待播队列走 query 参数（服务端去重需要）
      const r = await fetch('/api/voice?queued=' + encodeURIComponent(JSON.stringify(queuedPayload())),
        { method: 'POST', headers: { 'content-type': 'audio/webm' }, body: blob });
      note.querySelector('.body').textContent = r.ok ? '🎙 ✓ 语音已送达，转写中…' : '🎙 ✗ 没发出去，再试一次';
    } catch {
      setStage('');
      note.querySelector('.body').textContent = '🎙 ✗ 没发出去，再试一次';
      if (hotlineOn) chatMode('📞 热线通话中');
    }
  }
}

$('btn-call').addEventListener('pointerdown', async (e) => {
  e.preventDefault();
  if (dictating) { // 第二击：结束听写，去转写
    dictating = false;
    sendMode = 'dictate';
    endRecording();
    return;
  }
  longHold = false;
  if (!(await prewarmMic())) return;
  if (!beginRecording()) return;
  $('btn-call').classList.add('listening');
  lpTimer = setTimeout(() => { longHold = true; }, LONGPRESS_MS); // 长按=按住说话模式
});
$('btn-call').addEventListener('pointerup', () => {
  clearTimeout(lpTimer);
  if (recorder?.state !== 'recording') return; // 听写结束击的抬起 / 未在录音
  if (longHold) { sendMode = 'dictate'; dictating = false; endRecording(); } // 按住说完松手→转文字
  else if (!dictating) { // 单击抬起：继续录，等第二击结束
    dictating = true;
    $('text-input').placeholder = '正在听…说完再点一下 🎙';
  }
});
$('btn-call').addEventListener('pointercancel', () => {
  clearTimeout(lpTimer);
  if (recorder?.state === 'recording') {
    sendMode = 'dictate';
    dictating = false;
    endRecording();
  }
});

// 文字消息：随时可用。本地立即上屏 + 发送回执（✓ 已送达 / ✗ 失败），不再"发了像没发"
function sendMessage(text) {
  if (!text) return;
  const wrap = addMsg('user', '你', text);
  const st = document.createElement('span');
  st.className = 'st'; st.textContent = ' · 发送中…';
  wrap?.querySelector('.meta')?.appendChild(st);
  pendingSent.push(text);
  if (hotlineOn) chatMode('📞 已说给卡卡…');
  else setStage('热线接通中');
  post('/api/message', { text, queued: queuedPayload() })
    .then(r => { st.textContent = r.ok ? ' · ✓ 已送达' : ' · ✗ 发送失败'; st.classList.toggle('ok', r.ok); })
    .catch(() => { st.textContent = ' · ✗ 没发出去，再试一次'; setStage(''); });
}
function sendText() {
  const text = $('text-input').value.trim();
  $('text-input').value = '';
  sendMessage(text);
}
$('btn-send').onclick = sendText;
$('text-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendText(); });

// ===== V1.2 天气角标：把幕后感知晒出来 —— 角标是「电台知道窗外什么天」的收据；
// 点角标可切城市（演示技巧：切到正在下雨的城市，立刻看选歌氛围与串场跟着变）
const WX_ICONS = [['雷', '⛈️'], ['雨', '🌧️'], ['雪', '🌨️'], ['雾', '🌫️'], ['多云', '⛅'], ['阴', '☁️'], ['晴', '☀️']];
const wxIcon = (t) => (WX_ICONS.find(([k]) => (t || '').includes(k)) || [null, '🌡️'])[1];
function renderWx(w) {
  const el = $('wx');
  if (!w) { el.hidden = true; return; } // 坐标没配 / 服务拿不到 → 角标不出现，不打扰
  el.hidden = false;
  el.textContent = [wxIcon(w.text), w.city, Number.isFinite(w.temp) ? `${w.temp}°` : '']
    .filter(Boolean).join(' ');
  el.title = `${w.summary}（点击切换城市）`;
}
async function loadWx() {
  try { renderWx((await (await fetch('/api/weather')).json()).weather); } catch {}
}
$('wx').onclick = () => {
  const p = $('wx-pop');
  p.hidden = !p.hidden;
  if (!p.hidden) $('wx-city').focus();
};
$('wx-city').addEventListener('keydown', async (e) => {
  if (e.key === 'Escape') { $('wx-pop').hidden = true; return; }
  if (e.key !== 'Enter') return;
  const name = $('wx-city').value.trim();
  if (!name) return;
  try {
    const r = await (await post('/api/weather/city', { name })).json();
    if (!r.ok) throw new Error(r.error);
    renderWx(r.weather);
    $('wx-pop').hidden = true; $('wx-city').value = '';
    $('wx-city').placeholder = '城市名，回车切换（如：伦敦）';
  } catch (err) {
    $('wx-city').value = '';
    $('wx-city').placeholder = err.message || '切换失败，换个名字再试';
  }
});
loadWx(); setInterval(loadWx, 10 * 60_000); // 后端缓存 30min，角标最多迟 10min
</script>
